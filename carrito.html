<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tu carrito</title>
</head>

<body style="
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
">

<h1>🛒 Tu pedido</h1>

<div id="carrito"></div>

<hr>

<h2>
Total:
$<span id="total">0</span>
</h2>

<button onclick="vaciar()">
🗑 Vaciar carrito
</button>

<br><br>

<textarea
id="pedido"
style="
width:100%;
height:160px;">
</textarea>

<br><br>

<button onclick="generar()">
📋 Generar pedido
</button>

<button onclick="copiar()">
📱 Copiar para Instagram
</button>

<script>

function precioActual(item){

if(
item.cantidad >= item.mayorDesde
&& item.precioMayor > 0
){
 return item.precioMayor;
}

return item.precio;
}

function render(){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let html = "";
let total = 0;

if(carrito.length === 0){
 html =
 "<p>Tu carrito está vacío 🛒</p>";
}

carrito.forEach((item,index)=>{

let precio =
precioActual(item);

let subtotal =
precio * item.cantidad;

total += subtotal;

let mayorista =
item.cantidad >= item.mayorDesde
&& item.precioMayor > 0;

html += `
<div style="
display:flex;
gap:15px;
align-items:center;
border:1px solid #ddd;
padding:10px;
margin-bottom:12px;
border-radius:10px;">

<img
src="${item.imagen}"
style="
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;">

<div style="flex:1">

<b>${item.nombre}</b><br>

Precio:
$${precio.toLocaleString('es-CL')}

${mayorista
? `<br>
<span style="
color:green;
font-weight:bold;">
🎉 Precio mayorista aplicado
</span>

<br>

<span style="
color:#1b5e20;
font-size:14px;">
💰 Ahorras
$${(
(item.precio - item.precioMayor)
* item.cantidad
).toLocaleString('es-CL')}
comprando por mayor
</span>`
: ""}

<br><br>

<button onclick="restar(${index})">
➖
</button>

${item.cantidad}

<button onclick="sumar(${index})">
➕
</button>

<br><br>

Subtotal:
<b>
$${subtotal.toLocaleString('es-CL')}
</b>

</div>
</div>
`;
});

document.getElementById(
"carrito"
).innerHTML = html;

document.getElementById(
"total"
).innerText =
total.toLocaleString("es-CL");

}

function sumar(index){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
);

carrito[index].cantidad++;

localStorage.setItem(
"benditoCarrito",
JSON.stringify(carrito)
);

render();
}

function restar(index){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
);

carrito[index].cantidad--;

if(
carrito[index].cantidad <= 0
){
 carrito.splice(index,1);
}

localStorage.setItem(
"benditoCarrito",
JSON.stringify(carrito)
);

render();
}

function vaciar(){

localStorage.removeItem(
"benditoCarrito"
);

render();
}

function generar(){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let texto =
"Hola 👋 quiero hacer este pedido:\n\n";

let total = 0;

carrito.forEach(item=>{

let precio =
precioActual(item);

let subtotal =
precio * item.cantidad;

total += subtotal;

texto +=
`• ${item.nombre}
x${item.cantidad}
= $${subtotal.toLocaleString('es-CL')}\n`;
});

texto +=
`\n💰 Total:
$${total.toLocaleString('es-CL')}`;

document.getElementById(
"pedido"
).value = texto;
}

function copiar(){

let t =
document.getElementById(
"pedido"
);

t.select();

document.execCommand(
"copy"
);

alert(
"Pedido copiado 👍"
);
}

render();

</script>

</body>
</html>
