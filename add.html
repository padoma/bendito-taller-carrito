<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agregar producto</title>
</head>

<body style="font-family:Arial;text-align:center;padding-top:60px;">

<h2>Producto agregado 🛒</h2>
<p>Volviendo a Bendito Taller...</p>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const nombre = params.get("nombre");
const precio = Number(params.get("precio"));

let carrito =
JSON.parse(localStorage.getItem("benditoCarrito")) || [];

let existe =
carrito.find(p => p.id === id);

if(existe){
  existe.cantidad++;
}else{
  carrito.push({
    id,
    nombre,
    precio,
    cantidad:1
  });
}

localStorage.setItem(
"benditoCarrito",
JSON.stringify(carrito)
);

// volver atrás automáticamente
setTimeout(() => {
   history.back();
}, 800);

</script>

</body>
</html>
