<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Pedido | Bendito Taller</title>
    
    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #7d8b63;
            --primary-gradient: linear-gradient(135deg, #7d8b63 0%, #63704b 100%);
            --danger-gradient: linear-gradient(135deg, #c9b8a3 0%, #b2a18c 100%);
            --bg-light: #fffcf8;
            --bg-card: #ffffff;
            --text-main: #4b372d;
            --text-muted: #73645b;
            --border-color: #e5dacb;
            --shadow-sm: 0 4px 10px rgba(75, 55, 45, 0.05);
            --shadow-md: 0 10px 25px rgba(75, 55, 45, 0.08);
            --shadow-lg: 0 20px 40px rgba(75, 55, 45, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header img.logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(75, 55, 45, 0.08));
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }

        .header p {
            margin: 8px 0 0 0;
            font-size: 16px;
            color: var(--text-muted);
        }

        /* ===== CART ITEMS ===== */
        .cart-list {
            margin-bottom: 25px;
        }

        .cart-item-card {
            display: flex;
            gap: 20px;
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(229, 218, 203, 0.4);
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cart-item-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .cart-item-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 18px;
            border: 1px solid rgba(229, 218, 203, 0.3);
            box-shadow: var(--shadow-sm);
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .item-meta {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .item-obs {
            font-size: 13px;
            font-style: italic;
            color: #8e8076;
            margin-top: 4px;
            background: #fffcf8;
            padding: 6px 10px;
            border-radius: 10px;
            border-left: 2px solid var(--primary-color);
            display: inline-block;
        }

        .item-controls-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            border: none;
            background-color: #f0e6da;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        .qty-btn:hover {
            background-color: var(--border-color);
            transform: scale(1.05);
        }

        .qty-btn:active {
            transform: scale(0.95);
        }

        .qty-number {
            font-size: 15px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        .item-subtotal {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* ===== RESUMEN CARD ===== */
        .summary-card {
            background-color: var(--bg-card);
            border-radius: 28px;
            padding: 30px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(229, 218, 203, 0.4);
        }

        .summary-card h2 {
            margin: 0 0 15px 0;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
        }

        .total-display {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .obs-label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        textarea.general-obs {
            width: 100%;
            height: 100px;
            border-radius: 18px;
            border: 1.5px solid var(--border-color);
            padding: 14px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-main);
            resize: none;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        textarea.general-obs:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(125, 139, 99, 0.15);
        }

        /* ===== ACTIONS ===== */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-action {
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            grid-column: span 2;
            font-size: 16px;
            padding: 18px;
        }

        .btn-primary:hover {
            filter: brightness(1.03);
        }

        .btn-secondary {
            background: #e2d9cf;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            background: var(--danger-gradient);
            color: white;
        }

        .btn-danger:hover {
            filter: brightness(0.97);
        }

        .delete-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
            padding: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .delete-btn:hover {
            background-color: rgba(220, 53, 69, 0.1);
            transform: scale(1.1);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background-color: var(--bg-card);
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(229, 218, 203, 0.4);
            font-size: 18px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }

            .header h1 {
                font-size: 26px;
            }

            .cart-item-card {
                padding: 16px;
                gap: 15px;
            }

            .cart-item-card img {
                width: 80px;
                height: 80px;
            }

            .item-name {
                font-size: 16px;
            }

            .actions-grid {
                grid-template-columns: 1fr;
            }

            .btn-primary {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- HEADER -->
    <div class="header">
        <img src="https://padoma.github.io/bendito-taller-carrito/img/LOGO.png" alt="Bendito Taller" class="logo">
        <h1>Tu Carrito de Compras</h1>
        <p>Revisa tus artículos y copia el pedido para enviarlo por Instagram</p>
    </div>

    <!-- LISTA DE PRODUCTOS -->
    <div id="cartContainer"></div>

</div>

<script>
    // Leer del LocalStorage compartido del Sistema A ("carrito")
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    // Set de códigos intercambiables normalizados (lowercase, sin caracteres especiales)
    const codigosIntercambiablesNorm = new Set([
        "bc4", "co120cm", "co130cm", "co1020cm", "co1030cm", "co11", 
        "co1220cm", "co1230cm", "co13", "co14", "co1520cm", "co1530cm", 
        "co16", "co1720cm", "co1730cm", "co18", "co19", "co220cm", 
        "co230cm", "co20", "co21", "co22", "co23", "co2420cm", "co2430cm", 
        "co2520cm", "co2530cm", "co26", "co2720cm", "co2730cm", "co28", 
        "co2920cm", "co2930cm", "co3", "co30", "co31", "co32", "co3320cm", 
        "co3330cm", "co3420cm", "co3430cm", "co3620cm", "co3630cm", 
        "co37", "co420cm", "co430cm", "co520cm", "co530cm", "co620cm", 
        "co630cm", "co720cm", "co730cm", "co820cm", "co830cm", "co920cm", 
        "co930cm", "cruz1", "cruz2", "setcorazonesmulticapa", "florcora1", 
        "florcora2", "florcora3", "bc1", "bc2", "bc3", "ca120cm", "ca130cm", 
        "ca1020cm", "ca1030cm", "ca11trio", "ca123mm", "ca1255mm", 
        "ca133mm", "ca1355mm", "ca14", "ca15", "ca1620cm", "ca1630cm", 
        "ca1720cm", "ca1730cm", "ca18", "ca220cm", "ca230cm", "ca420cm", 
        "ca430cm", "ca520cm", "ca530cm", "ca620cm", "ca630cm", "ca7", 
        "ca8", "ca9trio"
    ]);

    function obtenerCodigoItemNormalizado(item) {
        let raw = item.codigo;
        if (item.medida) {
            raw += "_" + item.medida;
        } else if (item.variante) {
            raw += "_" + item.variante;
        }
        return raw.toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function esItemIntercambiable(itemNorm) {
        return codigosIntercambiablesNorm.has(itemNorm);
    }

    function esMedida30cm(itemNorm) {
        return itemNorm.includes("30cm");
    }

    function recalcularPreciosCarrito() {
        let totalGeneral = 0;
        let total30cm = 0;

        // Primer paso: Contar cantidades de intercambiables
        carrito.forEach(item => {
            const norm = obtenerCodigoItemNormalizado(item);
            if (esItemIntercambiable(norm)) {
                if (esMedida30cm(norm)) {
                    total30cm += item.cantidad;
                } else {
                    totalGeneral += item.cantidad;
                }
            }
        });

        // Segundo paso: Asignar precios y subtotales en base a las sumas grupales
        carrito.forEach(item => {
            const norm = obtenerCodigoItemNormalizado(item);
            let aplicaMayorista = false;

            if (esItemIntercambiable(norm)) {
                aplicaMayorista = esMedida30cm(norm) ? (total30cm >= 4) : (totalGeneral >= 4);
            } else {
                aplicaMayorista = (item.cantidad >= 4);
            }

            item.precio = aplicaMayorista ? item.mayor : item.unitario;
            item.tipo = (aplicaMayorista && item.mayor < item.unitario) ? "Por Mayor" : "Unitario";
        });
    }

    function render() {
        const container = document.getElementById("cartContainer");
        
        if (carrito.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🛒</div>
                    <div>Tu carrito está vacío.</div>
                    <button class="btn-action btn-secondary" onclick="volverCatalogo()" style="margin: 20px auto 0 auto;">
                        ⬅ Volver al Catálogo
                    </button>
                </div>
            `;
            return;
        }

        // Recalcular precios antes de renderizar
        recalcularPreciosCarrito();

        let itemsHtml = "";
        let total = 0;

        carrito.forEach((item, index) => {
            let subtotal = item.precio * item.cantidad;
            total += subtotal;

            let detalles = [];
            if (item.medida) detalles.push(`Medida: ${item.medida}`);
            if (item.variante) detalles.push(`Opción: ${item.variante}`);
            
            let ahorroStr = "";
            if (item.precio < item.unitario) {
                detalles.push(`<span style="color: var(--primary-color); font-weight: 600;">Por Mayor</span>`);
                let ahorro = (item.unitario - item.mayor) * item.cantidad;
                ahorroStr = `<div style="font-size: 13px; color: #2e7d32; font-weight: 500; margin-top: 4px;">💰 Ahorras $${ahorro.toLocaleString("es-CL")} (Precio mayorista aplicado)</div>`;
            }

            let detallesStr = detalles.join(" | ");

            itemsHtml += `
                <div class="cart-item-card">
                    <img src="${item.imagen}" alt="${item.nombre}" onerror="this.src='https://via.placeholder.com/100?text=Sin+Foto'">
                    
                    <div class="item-details">
                        <div class="item-name">${item.nombre}</div>
                        <div class="item-meta">${detallesStr}</div>
                        ${item.observacion ? `<div class="item-obs">Nota: "${item.observacion}"</div>` : ""}
                        ${ahorroStr}
                        
                        <div class="item-controls-price">
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="restar(${index})">−</button>
                                <span class="qty-number">${item.cantidad}</span>
                                <button class="qty-btn" onclick="sumar(${index})">+</button>
                                <button class="delete-btn" onclick="eliminar(${index})" title="Eliminar producto">🗑️</button>
                            </div>
                            <div class="item-subtotal">$${subtotal.toLocaleString("es-CL")}</div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = `
            <div class="cart-list">
                ${itemsHtml}
            </div>

            <div class="summary-card">
                <h2>Resumen del Pedido</h2>
                <div class="total-display">
                    Total: $<span>${total.toLocaleString("es-CL")}</span>
                </div>

                <label for="obsGeneral" class="obs-label">Observaciones Generales</label>
                <textarea id="obsGeneral" class="general-obs" placeholder="Ej: entrega especial, fecha límite de retiro, etc. (opcional)"></textarea>

                <div class="actions-grid">
                    <button class="btn-action btn-primary" onclick="copiar()">
                        📱 Copiar Pedido para Instagram
                    </button>
                    <button class="btn-action btn-secondary" onclick="volverCatalogo()">
                        ⬅ Seguir Comprando
                    </button>
                    <button class="btn-action btn-danger" onclick="vaciar()">
                        🗑 Vaciar Carrito
                    </button>
                </div>
            </div>
        `;
    }

    function guardar() {
        localStorage.setItem("carrito", JSON.stringify(carrito));
    }

    function sumar(index) {
        carrito[index].cantidad++;
        guardar();
        render();
    }

    function restar(index) {
        if (carrito[index].cantidad > 1) {
            carrito[index].cantidad--;
            guardar();
            render();
        }
    }

    function eliminar(index) {
        if (confirm("¿Deseas eliminar este producto de tu pedido?")) {
            carrito.splice(index, 1);
            guardar();
            render();
        }
    }

    function vaciar() {
        if (confirm("¿Seguro que deseas vaciar tu carrito?")) {
            carrito = [];
            guardar();
            render();
        }
    }

    function volverCatalogo() {
        const volver = localStorage.getItem("volverCatalogo") || "https://sites.google.com/view/bendito-taller/p%C3%A1gina-principal";
        if (window.self !== window.top) {
            window.top.location.href = volver;
        } else {
            window.location.href = volver;
        }
    }

    function copiar() {
        if (carrito.length === 0) return;

        let mensaje = `Hola 😊 quiero cotizar estos productos de Bendito Taller:\n\n`;

        carrito.forEach(item => {
            let precio = item.precio;
            let subtotal = precio * item.cantidad;

            let det = [];
            if (item.medida) det.push(`Medida: ${item.medida}`);
            if (item.variante) det.push(`Opción: ${item.variante}`);
            if (item.precio < item.unitario) det.push(`Precio Mayorista aplicado`);
            let detStr = det.length > 0 ? ` (${det.join(" | ")})` : "";

            mensaje += `• ${item.nombre}${detStr}\n`;
            mensaje += `  COD: ${item.codigo}\n`;
            mensaje += `  Cantidad: ${item.cantidad}\n`;
            if (item.observacion) mensaje += `  Nota: "${item.observacion}"\n`;
            mensaje += `  Subtotal: $${subtotal.toLocaleString("es-CL")}\n\n`;
        });

        const total = carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
        mensaje += `💰 Total estimado: $${total.toLocaleString("es-CL")}\n`;

        const obsGeneralVal = document.getElementById("obsGeneral").value.trim();
        if (obsGeneralVal) {
            mensaje += `\nObservaciones generales:\n"${obsGeneralVal}"`;
        }

        navigator.clipboard.writeText(mensaje)
            .then(() => {
                alert("¡Pedido copiado al portapapeles! Abrir Instagram para enviarlo.");
                window.open("https://www.instagram.com/bendito_taller_/", "_blank");
            })
            .catch(err => {
                console.error("Error al copiar: ", err);
                const t = document.createElement("textarea");
                t.value = mensaje;
                document.body.appendChild(t);
                t.select();
                document.execCommand("copy");
                document.body.removeChild(t);
                alert("¡Pedido copiado! Abrir Instagram para enviarlo.");
                window.open("https://www.instagram.com/bendito_taller_/", "_blank");
            });
    }

    // Inicializar
    render();
</script>

</body>
</html>
