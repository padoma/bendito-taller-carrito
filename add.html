<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Producto agregado</title>
</head>

<body style="
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
">

<div>
<h2>🛒 Producto agregado</h2>
<p>Tu producto fue añadido al carrito</p>
<p>Esta ventana se cerrará sola...</p>
</div>

<script>

const params =
new URLSearchParams(window.location.search);

const producto = {
 id: params.get("id"),
 nombre: params.get("nombre"),
 precio: Number(params.get("precio")),
 imagen: params.get("imagen"),
 mayorDesde:
 Number(params.get("mayordesde")) || 999,
 precioMayor:
 Number(params.get("preciomayor")) || 0
};

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let existe =
carrito.find(
p => p.id === producto.id
);

if(existe){
 existe.cantidad++;
}else{
 carrito.push({
   ...producto,
   cantidad:1
 });
}

localStorage.setItem(
"benditoCarrito",
JSON.stringify(carrito)
);

setTimeout(() => {
 window.close();
}, 1000);

</script>

</body>
</html>
