<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Producto agregado</title>
</head>

<body style="
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
background:#f5f1eb;
padding:20px;
">

<div style="
background:white;
padding:30px;
border-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,.12);
max-width:320px;
width:100%;
border:2px solid #00FFBC;
">

<div style="
font-size:56px;
margin-bottom:10px;">
🛍️
</div>

<h2 style="
font-size:45px;
margin:0 0 14px 0;
color:#4b372d;">
¡Producto agregado!
</h2>

<p style="
font-size:35px;
line-height:1.5;
margin:0;
color:#5f4b42;">
Tu producto fue añadido
al carrito
</p>

<p style="
font-size:30px;
margin-top:20px;
color:#777;">
Esta ventana se cerrará en

<b>
<span id="contador">
3
</span>
</b>

segundos...
</p>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const producto = {
 id: params.get("id"),
 nombre: params.get("nombre")
?.replace(/\+/g, " "),
 precio: Number(params.get("precio")),
 imagen: params.get("imagen"),
 mayorDesde:
 Number(params.get("mayordesde")) || 999,
 precioMayor:
 Number(params.get("preciomayor")) || 0
};

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let existe =
carrito.find(
p => p.id === producto.id
);

if(existe){
 existe.cantidad++;
}else{
 carrito.push({
   ...producto,
   cantidad:1
 });
}

localStorage.setItem(
"benditoCarrito",
JSON.stringify(carrito)
);

let segundos = 3;

const intervalo =
setInterval(() => {

segundos--;

document.getElementById(
"contador"
).innerText = segundos;

if(segundos <= 0){
 clearInterval(intervalo);
}

},1000);
 
setTimeout(() => {
 window.close();
}, 3000);

</script>

</body>
</html>
