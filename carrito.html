<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tu carrito - Bendito Taller</title>
</head>

<body style="
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
">

<h1>🛒 Tu pedido</h1>

<div id="carrito"></div>

<hr>

<h2>
Total:
$<span id="total">0</span>
</h2>

<button onclick="vaciar()"
style="
padding:10px;
background:#b00020;
color:white;
border:none;
border-radius:8px;
cursor:pointer;">
🗑 Vaciar carrito
</button>

<br><br>

<textarea
id="pedido"
style="
width:100%;
height:160px;
padding:10px;">
</textarea>

<br><br>

<button onclick="generar()"
style="
padding:12px;
background:black;
color:white;
border:none;
border-radius:8px;
cursor:pointer;">
📋 Generar pedido
</button>

<button onclick="copiar()"
style="
padding:12px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;">
📱 Copiar para Instagram
</button>

<script>

function render(){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let html = "";
let total = 0;

if(carrito.length === 0){
html =
"<p>Tu carrito está vacío 🛒</p>";
}

carrito.forEach((item,index)=>{

let subtotal =
item.precio *
item.cantidad;

total += subtotal;

html += `
<div style="
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
border-radius:8px;">

<b>${item.nombre}</b><br>

Cantidad:
${item.cantidad}<br>

Subtotal:
$${subtotal.toLocaleString('es-CL')}

<br><br>

<button onclick="quitar(${index})">
❌ Quitar
</button>

</div>
`;
});

document.getElementById(
"carrito"
).innerHTML = html;

document.getElementById(
"total"
).innerText =
total.toLocaleString("es-CL");

}

function quitar(index){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

carrito.splice(index,1);

localStorage.setItem(
"benditoCarrito",
JSON.stringify(carrito)
);

render();
}

function vaciar(){

if(confirm(
"¿Vaciar carrito?"
)){

localStorage.removeItem(
"benditoCarrito"
);

render();

document.getElementById(
"pedido"
).value = "";
}
}

function generar(){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let texto =
"Hola 👋 quiero hacer este pedido:\n\n";

let total = 0;

carrito.forEach(item=>{

let subtotal =
item.precio *
item.cantidad;

total += subtotal;

texto +=
`• ${item.nombre}
x${item.cantidad}
= $${subtotal.toLocaleString('es-CL')}\n`;
});

texto +=
`\n💰 Total:
$${total.toLocaleString('es-CL')}`;

document.getElementById(
"pedido"
).value = texto;
}

function copiar(){

let t =
document.getElementById(
"pedido"
);

t.select();

document.execCommand(
"copy"
);

alert(
"Pedido copiado 👍"
);
}

render();

</script>

</body>
</html>
