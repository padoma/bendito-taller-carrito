<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tu carrito | Bendito Taller</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f5f1eb;
  margin:0;
  padding:30px;
  color:#4b372d;
}

.container{
  max-width:900px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:30px;
  font-size:34px;
}

.card{
  display:flex;
  gap:18px;
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:
  0 6px 18px rgba(0,0,0,.08);
  align-items:center;
}

.card img{
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:14px;
}

.info{
  flex:1;
}

.nombre{
  font-size:40px;
  font-weight:bold;
}

.precio{
  font-size:40px;
  margin-top:6px;
  color:#7a5c4d;
}

.mayorista{
  color:#2e7d32;
  font-weight:bold;
  margin-top:8px;
}

.ahorro{
  color:#558b2f;
  font-size:14px;
  margin-top:4px;
}

.controles{
  margin-top:14px;
}

.qty-btn{
  border:none;
  background:#d6c2b2;
  width:36px;
  height:36px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
}

.cantidad{
  margin:0 12px;
  font-size:20px;
  font-weight:bold;
}

.subtotal{
  font-size:20px;
  font-weight:bold;
  margin-top:12px;
}

.resumen{
  background:white;
  border-radius:20px;
  padding:28px;
  margin-top:30px;
  box-shadow:
  0 6px 18px rgba(0,0,0,.08);
}

.total{
  font-size:38px;
  font-weight:bold;
  text-align:center;
  margin:15px 0;
}

textarea{
  width:100%;
  height:160px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:14px;
  font-size:15px;
  resize:none;
  box-sizing:border-box;
}

.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:18px;
}

button.action{
  flex:1;
  border:none;
  padding:16px;
  border-radius:14px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.black{
  background:#5d4037;
  color:white;
}

.green{
  background:#4caf50;
  color:white;
}

.red{
  background:#c62828;
  color:white;
}

.vacio{
  text-align:center;
  font-size:20px;
  margin-top:50px;
}

</style>
</head>

<body>

<div class="container">

<div style="text-align:center; margin-bottom:25px;">

<img
src="https://padoma.github.io/bendito-taller-carrito/img/LOGO.png"
style="
max-width:220px;
width:100%;
height:auto;
margin-bottom:10px;
">

<h1 style="
margin:0;
font-size:34px;
color:#4b372d;">
🛒 Tu pedido "prueba"
</h1>

<p style="
margin-top:8px;
color:#7a5c4d;
font-size:16px;">
Selecciona tus productos y envíanos tu pedido por Instagram
</p>

</div>

<div id="carrito"></div>

<div class="resumen">

<h2 style="text-align:center;">
Resumen del pedido
</h2>

<div class="total">
$<span id="total">0</span>
</div>

<textarea
id="pedido"
placeholder="Aquí aparecerá tu pedido">
</textarea>

<div class="actions">

<button
class="action black"
onclick="generar()">
📋 Generar pedido
</button>

<button
class="action green"
onclick="copiar()">
📱 Copiar para Instagram
</button>

<button
class="action red"
onclick="vaciar()">
🗑 Vaciar carrito
</button>

</div>

</div>

</div>

<script>

function precioActual(item){
if(
item.cantidad >= item.mayorDesde
&& item.precioMayor > 0
){
return item.precioMayor;
}
return item.precio;
}

function render(){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let html = "";
let total = 0;

if(carrito.length===0){
html=`
<div class="vacio">
🛒 Tu carrito está vacío
</div>`;
}

carrito.forEach((item,index)=>{

let precio =
precioActual(item);

let subtotal =
precio * item.cantidad;

total += subtotal;

let mayorista =
item.cantidad >= item.mayorDesde
&& item.precioMayor > 0;

let ahorro =
(item.precio -
item.precioMayor)
* item.cantidad;

html += `
<div class="card">

<img src="${item.imagen}">

<div class="info">

<div class="nombre">
${item.nombre}
</div>

<div class="precio">
Precio unitario:
$${precio.toLocaleString('es-CL')}
</div>

${mayorista ? `
<div class="mayorista">
🎉 Precio mayorista aplicado
</div>

<div class="ahorro">
💰 Ahorras
$${ahorro.toLocaleString('es-CL')}
comprando por mayor
</div>
` : ""}

<div class="controles">

<button
class="qty-btn"
onclick="restar(${index})">
−
</button>

<span class="cantidad">
${item.cantidad}
</span>

<button
class="qty-btn"
onclick="sumar(${index})">
+
</button>

</div>

<div class="subtotal">
Subtotal:
$${subtotal.toLocaleString('es-CL')}
</div>

</div>

</div>
`;
});

document.getElementById(
"carrito"
).innerHTML = html;

document.getElementById(
"total"
).innerText =
total.toLocaleString("es-CL");

}

function sumar(index){
let c =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
));
c[index].cantidad++;
localStorage.setItem(
"benditoCarrito",
JSON.stringify(c)
);
render();
}

function restar(index){
let c =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
));
c[index].cantidad--;

if(c[index].cantidad<=0){
c.splice(index,1);
}

localStorage.setItem(
"benditoCarrito",
JSON.stringify(c)
);

render();
}

function vaciar(){
if(confirm(
"¿Vaciar carrito?"
)){
localStorage.removeItem(
"benditoCarrito"
);
render();
}
}

function generar(){

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let texto =
"Hola 👋 quiero hacer este pedido:\n\n";

let total=0;

carrito.forEach(item=>{

let precio =
precioActual(item);

let subtotal =
precio * item.cantidad;

total += subtotal;

texto +=
`• ${item.nombre}
x${item.cantidad}
= $${subtotal.toLocaleString('es-CL')}\n`;
});

texto +=
`\n💰 Total:
$${total.toLocaleString('es-CL')}`;

document.getElementById(
"pedido"
).value = texto;
}

function copiar(){
let t =
document.getElementById(
"pedido"
);
t.select();
document.execCommand(
"copy"
);
alert(
"Pedido copiado 👍"
);
}

render();

</script>

</body>
</html>
