<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Producto agregado</title>
</head>

<body style="
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
background:#fff;
">

<div>
<h2>🛒 Producto agregado</h2>
<p>Tu producto fue añadido al carrito</p>
<p>Esta ventana se cerrará sola...</p>
</div>

<script>

const params =
new URLSearchParams(window.location.search);

const id = params.get("id");
const nombre = params.get("nombre");
const precio =
Number(params.get("precio"));

let carrito =
JSON.parse(
localStorage.getItem(
"benditoCarrito"
)
) || [];

let existe =
carrito.find(p => p.id === id);

if(existe){
 existe.cantidad++;
}else{
 carrito.push({
   id,
   nombre,
   precio,
   cantidad:1
 });
}

localStorage.setItem(
"benditoCarrito",
JSON.stringify(carrito)
);

// cerrar sola
setTimeout(() => {
   window.close();
}, 1200);

</script>

</body>
</html>
